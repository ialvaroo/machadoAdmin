<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Novo Cliente</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>


<div class="topo">

    <div class="topo-esquerda">
        <h1 class="logo">Machado Admin</h1>
    </div>

    <div class="topo-direita">
        <button class="btn-vermelho">Sair</button>
    </div>

</div>


<h2>Novo Cliente</h2>


<label>Nome</label>
<input type="text" id="nome" placeholder="Digite o nome">


<label>Telefone</label>
<input type="text" id="telefone" placeholder="Digite o telefone">


<br><br>


<button onclick="salvar()" class="btn-pagar">

Salvar

</button>


<button onclick="cancelar()" class="btn-vermelho">

Cancelar

</button>



<!-- SUPABASE -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>



<script>


function cancelar(){

location.href="clientes.html";

}



async function salvar(){

let nome=document.getElementById("nome").value.trim();

let telefone=document.getElementById("telefone").value.trim();



if(nome===""){

alert("Digite o nome");

return;

}



let {error}=await supabaseClient

.from("clientes")

.insert([

{

nome,

telefone

}

]);


if(error){

console.log(error);

alert("Erro ao salvar");

return;

}



alert("Cliente salvo com sucesso");

location.href="clientes.html";

}


</script>



</body>
</html>
