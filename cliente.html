<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<title>Histórico do Cliente</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/style.css">



</head>


<body>

<div class="topo">

    <div class="topo-esquerda">
        <h1 class="logo">Machado Admin</h1>
    </div>

   <div class="topo-direita">
    <button id="logout" href="js/logoff.js" class="btn-vermelho">
    Sair
    </button>
    </div>

</div>


<h2>Histórico do Cliente</h2>

<div class="card" id="infoCliente">

<h3 style="padding: 0; margin-top: 0;">Dados do Cliente</h3>

<p><strong>Nome:</strong> <span id="clienteNome">...</span>

<strong>Telefone:</strong> <span id="clienteTelefone">...</span></p>

</div>


<div class="card">

<div class="table-container">

<table>

<thead>

<tr>

<th>Início</th>

<th>Valor</th>

<th>%</th>

<th>Juros</th>

<th>Pago</th>

<th>Faltante</th>

<th>Vencimento</th>

<th>Garantia</th>

<th>Status</th>

<th>Ação</th>

</tr>

</thead>


<tbody id="hist"></tbody>


</table>

</div>

<br>
<button onclick="voltar()" class="btn-vermelho">

Voltar

</button>


</div>



<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

<script src="js/cliente.js"></script>



<script>

function voltar(){

let origem = new URLSearchParams(window.location.search).get("origem");

if(origem){

window.location.href = origem;

}else{

window.location.href = "index.html";

}

}

</script>



</body>

</html>
