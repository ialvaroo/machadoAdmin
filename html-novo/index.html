<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Painel</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<header class="topbar">

<div class="logo">
MachadoAdmin
</div>

<nav class="menu">
<a href="index.html" class="ativo">Painel</a>
<a href="clientes.html">Clientes</a>
<a href="clientes.html">Perfil</a>
</nav>

<div class="actions">
<input type="text" id="pesquisa" placeholder="Buscar cliente">
</div>

</header>

<main class="container">

<!-- BOTÃO NOVO EMPRÉSTIMO -->

<div style="margin-bottom:20px;">

<button class="btn-verde" onclick="location.href='novo.html'">

<svg style="margin-right:6px;" xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
<path d="M14 1a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1z"/>
<path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4"/>
</svg>

Novo Empréstimo

</button>

</div>


<!-- TABELA PRINCIPAL -->

<section class="table">

<h2>Lista Principal</h2>

<div class="table-container">

<table id="tabela">

<thead>

<tr>

<th id="ordenarNome" style="cursor:pointer">Nome ⬍</th>
<th>Inicio</th>
<th>Valor</th>
<th>%</th>
<th>Juros</th>
<th>Pago</th>
<th>Total (Faltante)</th>
<th id="ordenarVencimento" style="cursor:pointer">Vencimento ⬍</th>
<th>Telefone</th>
<th>Garantia</th>
<th>Status</th>
<th>Ações</th>

</tr>

</thead>

<tbody></tbody>

</table>

</div>

</section>


<br><br>


<!-- TABELA DE RISCO -->

<section class="table">

<h2>Risco de perda (+60 dias)</h2>

<div class="table-container">

<table id="risco">

<thead>

<tr>

<th>Nome</th>
<th>Inicio</th>
<th>Valor</th>
<th>%</th>
<th>Juros</th>
<th>Pago</th>
<th>Total (Faltante)</th>
<th>Vencimento</th>
<th>Telefone</th>
<th>Garantia</th>
<th>Status</th>
<th>Ações</th>

</tr>

</thead>

<tbody></tbody>

</table>

</div>

</section>

</main>


<script src="js/supabase.js"></script>
<script src="js/painel.js"></script>
