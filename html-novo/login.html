<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema de Empréstimos</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
height:100vh;
display:flex;
background:#f8fafc;
}

/* LADO ESQUERDO */

.left{

flex:1;
display:flex;
flex-direction:column;
justify-content:center;
padding:80px;
background:linear-gradient(135deg,#2563eb,#1e40af);
color:white;

}

.logo{

font-size:20px;
font-weight:600;
margin-bottom:30px;

}

.left h1{

font-size:36px;
margin-bottom:15px;

}

.left p{

opacity:0.9;
max-width:420px;
line-height:1.6;

}

/* LADO LOGIN */

.right{

width:420px;
display:flex;
align-items:center;
justify-content:center;
background:white;

}

.login-box{

width:300px;

}

.login-box h2{

font-size:22px;
margin-bottom:8px;

}

.subtitle{

font-size:14px;
color:#6b7280;
margin-bottom:25px;

}

/* INPUT */

.input-group{

margin-bottom:18px;

}

input{

width:100%;
padding:12px;
border-radius:8px;
border:1px solid #e5e7eb;
font-size:14px;
transition:0.2s;

}

input:focus{

outline:none;
border-color:#2563eb;
box-shadow:0 0 0 3px rgba(37,99,235,0.1);

}

/* BOTÃO */

button{

width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-weight:500;
font-size:14px;
cursor:pointer;
transition:0.2s;

}

button:hover{

background:#1d4ed8;

}

/* FOOTER */

.footer{

margin-top:20px;
font-size:12px;
color:#9ca3af;
text-align:center;

}

</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabase = window.supabase.createClient(
"https://eaivlukvbuwlvvbmvwit.supabase.co",
"sb_publishable_Ik0zdu-MpFCp-DsFJiUWhg_MMigLcjj"
)


const form = document.querySelector("form")

form.addEventListener("submit", async (e)=>{

e.preventDefault()

const email = document.querySelector("input[type=text]").value
const senha = document.querySelector("input[type=password]").value

const { data, error } = await supabase.auth.signInWithPassword({

email: email,
password: senha

})

if(error){

alert("Login inválido")

}else{

window.location.href = "index.html"

}

})

</script>

<body>

<div class="left">

<div class="logo">
MachadoAdmin
</div>

<h1>Sistema de Empréstimos</h1>

<p>
Gerencie clientes, empréstimos e pagamentos
de forma simples e organizada em um único painel.
</p>

</div>

<div class="right">

<div class="login-box">

<h2>Entrar</h2>
<p class="subtitle">Acesse o painel do sistema</p>

<form action="index.html">

<div class="input-group">
<input type="text" placeholder="Usuário" required>
</div>

<div class="input-group">
<input type="password" placeholder="Senha" required>
</div>

<button type="submit">
Entrar
</button>

</form>

<div class="footer">
© 2026 MachadoAdmin
</div>

</div>

</div>

</body>
</html>
