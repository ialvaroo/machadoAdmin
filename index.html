<html>
<head>
<title>Painel</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>



<h2>Painel</h2>
<input type="text" id="pesquisa" placeholder="Pesquisar">

<a href="novo.html" class="btn-novo-emprestimo">Novo Empréstimo</a>
<button onclick="location.href='clientes.html'">Clientes</button>
<h3>Lista Principal</h3>
<table id="tabela">
<thead>
<th id="ordenarNome" style="cursor:pointer">Nome ⬍</th>

<th>Inicio</th>

<th>Valor</th>

<th>%</th>

<th>Juros</th>

<th>Pago</th>

<th>Total (Faltante)</th>

<th id="ordenarVencimento" style="cursor:pointer">Vencimento ⬍</th>

<th>Telefone</th>

<th>Garantia</th>

<th>Status</th>

<th>Ações</th>


</thead>
<tbody></tbody>
</table>
<h3>RISCO DE PERDA (+60 dias)</h3>

<table id="risco">

<thead>
<tr>

<th>Nome</th>
<th>Inicio</th>
<th>Valor</th>
<th>%</th>
<th>Juros</th>
<th>Pago</th>
<th>Total (Faltante)</th>
<th >Vencimento</th>
<th>Telefone</th>
<th>Garantia</th>
<th>Status</th>
<th>Ações</th>

</tr>

</thead>
<tbody>
</tbody>
</table>

<script src="js/supabase.js"></script>
<script src="js/painel.js"></script>
</body>
</html>
