<html>
<head>
<title>Painel</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="topo">

    <div class="topo-esquerda">
        <h1 class="logo">Machado Admin</h1>
    </div>

    <div class="topo-direita">
        <button class="btn-vermelho">Sair</button>
    </div>

</div>

<h2>Dashboard</h2>


<input type="text" id="pesquisa" placeholder="Pesquisar">


<button class="btn-verde" onclick="location.href='novo.html'">Novo Empréstimo</button>
<button class="btn-azul" onclick="location.href='clientes.html'">Clientes</button>

<p><br></p>

<h3>Lista Principal</h3>
<div class="table-container">
<table id="tabela">
<thead>
<th id="ordenarNome" style="cursor:pointer">Nome ⬍</th>

<th>Inicio</th>

<th>Valor</th>

<th>%</th>

<th>Juros</th>

<th>Pago</th>

<th>Total (Faltante)</th>

<th id="ordenarVencimento" style="cursor:pointer">Vencimento ⬍</th>

<th>Telefone</th>

<th>Garantia</th>

<th>Status</th>

<th>Ações</th>


</thead>
<tbody></tbody>
</table>
</div>

<br>
<h3>RISCO DE PERDA (+60 dias)</h3>

<div class="table-container">
<table id="risco">

<thead>
<tr>

<th>Nome</th>
<th>Inicio</th>
<th>Valor</th>
<th>%</th>
<th>Juros</th>
<th>Pago</th>
<th>Total (Faltante)</th>
<th >Vencimento</th>
<th>Telefone</th>
<th>Garantia</th>
<th>Status</th>
<th>Ações</th>

</tr>

</thead>
<tbody>
</tbody>
</table>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/painel.js"></script>
</body>
</html>
