<p><br></p>

<h3>Lista Principal</h3>
<div class="table-container">
<table id="tabela">
<thead>
<th id="ordenarNome" style="cursor:pointer">Nome ⬍</th>

<th>Inicio</th>

<th>Valor</th>

<th>%</th>

<th>Juros</th>

<th>Pago</th>

<th>Total (Faltante)</th>

<th id="ordenarVencimento" style="cursor:pointer">Vencimento ⬍</th>

<th>Telefone</th>

<th>Garantia</th>

<th>Status</th>

<th>Ações</th>


</thead>
<tbody></tbody>
</table>
</div>

<br>
<h3>RISCO DE PERDA (+60 dias)</h3>

<div class="table-container">
<table id="risco">

<thead>
<tr>

<th>Nome</th>
<th>Inicio</th>
<th>Valor</th>
<th>%</th>
<th>Juros</th>
<th>Pago</th>
<th>Total (Faltante)</th>
<th>Vencimento</th>
<th>Telefone</th>
<th>Garantia</th>
<th>Status</th>
<th>Ações</th>

</tr>

</thead>
<tbody>
</tbody>
</table>
</div>
