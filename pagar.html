<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pagar Empréstimo</title>
<link rel="stylesheet" href="css/style.css">

</head>
<body>


<div class="topo">

    <div class="topo-esquerda">
        <h1 class="logo">Machado Admin</h1>
    </div>

    <div class="topo-direita">
        <button class="btn-vermelho">Sair</button>
    </div>

</div>

<h2>Pagar Empréstimo</h2>

<div id="detalhesEmprestimo" class="card"></div>

<div class="card">

  <h3>Pagamento</h3>

  <div id="campoValor">
    <label>Pagar parte do valor:</label>
    <input type="text" id="valorPagamento" placeholder="R$ 0,00">
  </div>

  <br>

<div class="linha-checkbox">
<input type="checkbox" id="checkQuitar" onchange="alternarModo()">
<label for="checkQuitar" class="label-checkbox">
<strong>Quitar empréstimo</strong>
</label>
</div>

  <br>

  <button onclick="confirmarPagamento()" class="btn-azul">
    Confirmar Pagamento
  </button>

  <button onclick="cancelar()" class="btn-vermelho">
    Cancelar
  </button>

</div>

<script>
  
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/pagar.js"></script>

</body>
</html>
