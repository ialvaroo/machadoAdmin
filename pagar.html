<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Pagar Empréstimo</title>
  <link rel="stylesheet" href="css/style.css">

  <style>
    .card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      margin-top: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #eee;
      text-align: center;
      font-size: 14px;
    }

    th {
      background: #111827;
      color: white;
    }

    .ofuscado {
      opacity: 0.5;
      pointer-events: none;
      cursor: not-allowed;
    }

    .acoes {
      margin-top: 20px;
    }

    button {
      padding: 8px 14px;
      margin-right: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h2>Pagamento de Empréstimo</h2>

<div class="card">

  <h3>Detalhes do Empréstimo</h3>

  <table>
    <thead>
      <tr>
        <th>Cliente</th>
        <th>Valor Total</th>
        <th>Valor Pago</th>
        <th>Restante</th>
        <th>Juros (%)</th>
        <th>Data</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="tabelaDetalhes"></tbody>
  </table>

  <hr>

  <label>
    <input type="checkbox" id="quitarCheckbox">
    Quitar Empréstimo (Pagar tudo)
  </label>

  <br><br>

  <div id="campoParcial">
    <label>Valor para pagamento parcial:</label><br>
    <input type="number" id="valorPagamento" step="0.01" placeholder="Digite o valor">
  </div>

  <div class="acoes">
    <button onclick="pagarEmprestimo()">Confirmar Pagamento</button>
    <button onclick="voltar()">Cancelar</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/pagar.js"></script>

</body>
</html>
