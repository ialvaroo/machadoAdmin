<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Editar Empréstimo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/style.css">


</head>

<body>

<div class="topo">

    <div class="topo-esquerda">
        <h1 class="logo">Machado Admin</h1>
    </div>

    <div class="topo-direita">
        <button class="btn-vermelho">Sair</button>
    </div>

</div>


<h2>Editar Empréstimo</h2>


<!-- CLIENTE -->

<label>Cliente</label>

<input type="text" id="clienteInput" disabled>

<label>Telefone</label>

<input type="text" id="telefone" disabled>


</div>


<br>


<label>Valor</label>

<input type="text" id="valor" placeholder="R$ 0,00">


<label>Juros (%)</label>

<input type="number" id="percentual">


<label>Garantia</label>

<input type="text" id="garantia">


<label>Vencimento</label>

<input type="date" id="vencimento">


<br><br>


<button onclick="salvar()" class="btn-pagar">

Salvar

</button>


<button onclick="cancelar()" class="btn-vermelho">

Cancelar

</button>



<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

<script src="js/editar.js"></script>


</body>
</html>
